name: deploy-snowiac

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'terraform_templates/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy-snowiac.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RG: snowiac-app-rg
  APP: snowiac-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR
        id: acr
        run: |
          acr_name=$(az acr list -g $RG --query "[0].name" -o tsv)
          acr_login=$(az acr show -n $acr_name --query loginServer -o tsv)
          echo "name=$acr_name"   >> $GITHUB_OUTPUT
          echo "login=$acr_login" >> $GITHUB_OUTPUT

      - name: Build & push image
        run: |
          tag="${GITHUB_SHA::7}"
          az acr build \
            --registry "${{ steps.acr.outputs.name }}" \
            --image "snowiac:${tag}" \
            --image "snowiac:latest" \
            --file Dockerfile \
            .
          echo "IMAGE=${{ steps.acr.outputs.login }}/snowiac:${tag}" >> $GITHUB_ENV

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name "$APP" \
            --resource-group "$RG" \
            --image "$IMAGE"

      - name: Show endpoint
        run: |
          fqdn=$(az containerapp show -n "$APP" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed: https://$fqdn"
          echo "Webhook : https://$fqdn/webhooks/github"
