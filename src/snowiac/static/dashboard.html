<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SnowIaC — Multi-Agent Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0b1020;
    --panel: #141a32;
    --panel-2: #1c2547;
    --border: #2a335a;
    --text: #e6ecff;
    --muted: #8b95c4;
    --accent: #6aa9ff;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #c084fc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #070a18 0%, #0b1020 100%);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(20, 26, 50, 0.7);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 18px; letter-spacing: 0.5px; }
  header .sub { color: var(--muted); font-size: 12px; }
  .live { display: inline-flex; align-items: center; gap: 6px; color: var(--green); font-size: 12px; }
  .live::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 8px var(--green); animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  main { display: grid; grid-template-columns: 360px 1fr; gap: 0; min-height: calc(100vh - 60px); }
  .list {
    border-right: 1px solid var(--border); padding: 12px;
    overflow-y: auto; max-height: calc(100vh - 60px);
  }
  .list-empty { color: var(--muted); padding: 24px; text-align: center; font-size: 13px; }
  .ticket {
    padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--panel); margin-bottom: 8px; cursor: pointer; transition: 0.15s;
  }
  .ticket:hover { border-color: var(--accent); transform: translateY(-1px); }
  .ticket.selected { border-color: var(--accent); background: var(--panel-2); }
  .ticket .id { font-weight: 600; font-size: 13px; }
  .ticket .desc { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .ticket .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .ticket .ago { color: var(--muted); font-size: 11px; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px;
    font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .b-intake          { background: rgba(96,165,250,0.15); color: var(--blue); }
  .b-intake_validated { background: rgba(96,165,250,0.15); color: var(--blue); }
  .b-intake_rejected { background: rgba(248,113,113,0.15); color: var(--red); }
  .b-awaiting_human_merge { background: rgba(250,204,21,0.15); color: var(--yellow); }
  .b-deploy_applied  { background: rgba(192,132,252,0.15); color: var(--purple); }
  .b-deploy_failed   { background: rgba(248,113,113,0.15); color: var(--red); }
  .b-verified        { background: rgba(74,222,128,0.15); color: var(--green); }
  .b-verification_failed { background: rgba(248,113,113,0.15); color: var(--red); }
  .b-complete        { background: rgba(74,222,128,0.2); color: var(--green); }
  .b-escalated       { background: rgba(248,113,113,0.2); color: var(--red); }

  .detail { padding: 24px 28px; overflow-y: auto; max-height: calc(100vh - 60px); }
  .detail h2 { margin: 0 0 4px; font-size: 22px; }
  .detail .desc { color: var(--muted); margin-bottom: 20px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .card .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .card .v { font-size: 14px; margin-top: 4px; word-break: break-word; }

  .section-title {
    font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px;
    margin: 16px 0 8px;
  }

  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {
    content: ""; position: absolute; left: 5px; top: 4px; bottom: 4px;
    width: 2px; background: var(--border);
  }
  .event { position: relative; padding: 10px 0 10px 14px; }
  .event::before {
    content: ""; position: absolute; left: -20px; top: 16px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--panel-2); border: 2px solid var(--accent);
  }
  .event .row { display: flex; align-items: center; gap: 10px; }
  .event .msg { font-size: 13px; margin-top: 4px; color: var(--text); }
  .event .ts { color: var(--muted); font-size: 11px; }
  .event pre {
    background: #0a0e1f; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; font-size: 11px; color: #b5c0e0; overflow-x: auto; margin-top: 6px;
    max-height: 200px;
  }

  .spec {
    background: #0a0e1f; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 12px; color: #b5c0e0; overflow-x: auto;
  }
  .empty-detail { color: var(--muted); padding: 80px 0; text-align: center; }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <div>
    <h1>SnowIaC <span style="color: var(--muted); font-weight: 400;">— ServiceNow → Terraform → Azure</span></h1>
    <div class="sub">Multi-agent ticket triage & infrastructure automation</div>
  </div>
  <span class="live">LIVE</span>
</header>

<main>
  <aside class="list" id="list"><div class="list-empty">Loading…</div></aside>
  <section class="detail" id="detail"><div class="empty-detail">Select a ticket to view its agent timeline</div></section>
</main>

<script>
let selected = null;
let lastTickets = [];

function ago(ts) {
  if (!ts) return "";
  const t = new Date(ts.endsWith("Z") || ts.includes("T") ? ts : ts.replace(" ", "T") + "Z");
  const s = Math.max(0, Math.floor((Date.now() - t.getTime()) / 1000));
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}

function badge(stage) {
  if (!stage) return '<span class="badge b-intake">pending</span>';
  return `<span class="badge b-${stage}">${stage.replace(/_/g, " ")}</span>`;
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function loadList() {
  try {
    const r = await fetch("/api/tickets");
    const data = await r.json();
    lastTickets = data.tickets;
    renderList();
    if (selected) loadDetail(selected);
  } catch (e) { console.error(e); }
}

function renderList() {
  const el = document.getElementById("list");
  if (!lastTickets.length) {
    el.innerHTML = '<div class="list-empty">No tickets yet.<br><br>POST one to <code>/tickets/intake</code></div>';
    return;
  }
  el.innerHTML = lastTickets.map(t => `
    <div class="ticket ${selected === t.ticket_id ? "selected" : ""}" onclick="select('${t.ticket_id}')">
      <div class="id">${escapeHtml(t.ticket_id)}</div>
      <div class="desc">${escapeHtml(t.short_description || t.catalog || "")}</div>
      <div class="meta">${badge(t.last_stage)}<span class="ago">${ago(t.last_event_at)}</span></div>
    </div>
  `).join("");
}

function select(id) {
  selected = id;
  renderList();
  loadDetail(id);
}

async function loadDetail(id) {
  try {
    const r = await fetch(`/api/tickets/${id}`);
    if (!r.ok) return;
    const d = await r.json();
    renderDetail(d);
  } catch (e) { console.error(e); }
}

function renderDetail(d) {
  const t = d.ticket;
  const events = d.events || [];
  const spec = d.spec;

  const cards = [
    ["Ticket", t.RITM],
    ["Catalog", t.Catalog],
    ["Requested for", t.RequestedFor],
    ["Manager", t.Manager],
    ["State", t.State || "—"],
    ["Created", t.CreatedDate || "—"],
  ];

  const cardHtml = cards.map(([k, v]) => `
    <div class="card"><div class="k">${k}</div><div class="v">${escapeHtml(v)}</div></div>
  `).join("");

  const timelineHtml = events.length ? events.map(e => {
    const payload = e.payload ? `<pre>${escapeHtml(JSON.stringify(e.payload, null, 2))}</pre>` : "";
    let msg = escapeHtml(e.message);
    // auto-link URLs
    msg = msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
    return `
      <div class="event">
        <div class="row">${badge(e.stage)}<span class="ts">${ago(e.created)}</span></div>
        <div class="msg">${msg}</div>
        ${payload}
      </div>`;
  }).join("") : '<div style="color: var(--muted); font-size: 13px;">No events yet</div>';

  const specHtml = spec
    ? `<div class="spec">${escapeHtml(JSON.stringify(spec, null, 2))}</div>`
    : '<div style="color: var(--muted); font-size: 13px;">No verification spec persisted yet</div>';

  document.getElementById("detail").innerHTML = `
    <h2>${escapeHtml(t.RITM)}</h2>
    <div class="desc">${escapeHtml(t.ShortDescription || "")}</div>
    <div class="grid">${cardHtml}</div>
    <div class="section-title">Agent timeline</div>
    <div class="timeline">${timelineHtml}</div>
    <div class="section-title" style="margin-top: 24px;">Verification spec</div>
    ${specHtml}
  `;
}

loadList();
setInterval(loadList, 2000);
</script>
</body>
</html>
